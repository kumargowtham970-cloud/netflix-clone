<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlix Admin - Upload Video</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-container {
            max-width: 600px;
            margin: 100px auto;
            background-color: rgba(20, 20, 20, 0.95);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
        }

        .admin-title {
            font-size: 2rem;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
        }

        input[type="text"],
        input[type="file"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid #444;
            background-color: #333;
            color: #fff;
            font-family: inherit;
        }

        input[type="file"] {
            padding: 8px;
            background-color: #222;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 20px;
        }

        .submit-btn:hover {
            background-color: #f40612;
        }

        .submit-btn:disabled {
            background-color: #888;
            cursor: not-allowed;
        }

        #upload-status {
            margin-top: 15px;
            text-align: center;
            font-weight: 600;
        }

        .success {
            color: #46d369;
        }

        .error {
            color: #e50914;
        }
    </style>
</head>

<body>
    <nav class="navbar scrolled">
        <div class="nav-left">
            <h1 class="logo">STREAMFLIX <span style="color: #888; font-size: 1rem;">ADMIN</span></h1>
            <ul class="nav-links">
                <li><a href="index.html">Back to Site</a></li>
            </ul>
        </div>
    </nav>

    <div class="admin-container">
        <h2 class="admin-title">Upload New Video</h2>

        <form id="upload-form">
            <div class="form-group">
                <label for="title">Movie Title</label>
                <input type="text" id="title" name="title" required placeholder="e.g. Inception">
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="3" required
                    placeholder="A brief summary..."></textarea>
            </div>

            <div class="form-group">
                <label for="category">Category Row</label>
                <select id="category" name="category" required>
                    <option value="Trending Now">Trending Now</option>
                    <option value="Action Thrillers">Action Thrillers</option>
                    <option value="Comedy">Comedy</option>
                    <option value="My Uploads">My Uploads</option>
                </select>
            </div>

            <div class="form-group">
                <label for="thumbnail">Thumbnail Image (JPG/PNG)</label>
                <input type="file" id="thumbnail" name="thumbnail" accept="image/*" required>
            </div>

            <div class="form-group">
                <label for="video">Video File (MP4)</label>
                <input type="file" id="video" name="video" accept="video/mp4,video/x-m4v,video/*" required>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">Upload to StreamFlix</button>
            <div id="upload-status"></div>
        </form>
    </div>

    <script src="admin.js"></script>
</body>

</html>
