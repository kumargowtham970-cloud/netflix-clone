<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamFlix - Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-bg"></div>
        <div class="auth-header">
            <h1 class="logo" onclick="window.location.href='index.html'">STREAMFLIX</h1>
        </div>

        <div class="auth-container">
            <div id="login-box" class="auth-box">
                <h2>Sign In</h2>
                <div id="login-error" class="error-msg"></div>
                <form id="login-form">
                    <input type="email" id="login-email" placeholder="Email or phone number" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="submit" class="auth-submit" id="login-btn">Sign In</button>
                    <div class="auth-helper">
                        <label><input type="checkbox" checked> Remember me</label>
                        <a href="#">Need help?</a>
                    </div>
                </form>
                <div class="auth-switch">
                    New to StreamFlix? <span onclick="toggleAuth('signup')">Sign up now.</span>
                </div>
            </div>

            <div id="signup-box" class="auth-box" style="display: none;">
                <h2>Register</h2>
                <div id="signup-error" class="error-msg"></div>
                <div id="signup-success" class="success-msg"></div>
                <form id="signup-form">
                    <input type="text" id="signup-name" placeholder="Full Name" required>
                    <input type="email" id="signup-email" placeholder="Email address" required>
                    <input type="password" id="signup-password" placeholder="Create Password" required>
                    <button type="submit" class="auth-submit" id="signup-btn">Sign Up</button>
                </form>
                <div class="auth-switch">
                    Already have an account? <span onclick="toggleAuth('login')">Sign In.</span>
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>

</html>
